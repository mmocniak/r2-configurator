<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>R2 configurator — state-audit prompt generator</title>
<style>
  :root{--bg:#e8ecf1;--panel:#fff;--ink:#1d2733;--muted:#5b6673;--line:#d7dee6;--sel:#1f7f8c;--good:#1f9d57;--r:12px}
  @media (prefers-color-scheme:dark){:root{--bg:#0e1319;--panel:#161c24;--ink:#e6ecf2;--muted:#9aa7b4;--line:#2a333e;--sel:#3fb2c0;--good:#3cc274}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:28px}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-size:19px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .sub a{color:var(--sel)}
  .toolbar{margin:0 0 14px}
  button{font:inherit;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:var(--sel)}
  button.ok{color:var(--good);border-color:var(--good)}
  .grid{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:6px 16px}
  .row{display:flex;align-items:center;gap:12px;padding:7px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}
  .row .nm{flex:1}
  .row .vr{color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>State-audit prompt generator</h1>
  <p class="sub">Reads the live <code>data/states.js</code> — nothing here can drift from the app.
  Copy a state's prompt, paste it into any LLM with web search (one state per chat), and save the
  returned JSON as <code>validation/results/YYYY-MM/XX.json</code>. Process: <a href="README.md">README.md</a> ·
  schema: <a href="RESULT_SCHEMA.md">RESULT_SCHEMA.md</a>.</p>
  <div class="toolbar"><button id="copyAll">Copy all current values (JSON)</button></div>
  <div class="grid" id="list"></div>
</div>

<!-- KEEP IN SYNC with INSTRUCTIONS.md (the canonical playbook) -->
<script type="text/plain" id="playbook">
## Audit playbook

Work through the fields in order, follow the source hierarchy exactly, and report — never guess, never edit files. Your entire output is one JSON object (skeleton below).

Vehicle assumptions (for weight- or price-tiered fees): Rivian R2, MY 2026-27, electric SUV, curb weight class 4,500-5,500 lb (use the tier containing ~5,000 lb), $55,000 MSRP class.

Fields, source order, and match tolerances (stop at the first authoritative source; cite its URL):

1. tax — upfront purchase tax, % of (price + destination − trade-in).
   FIRST check whether the state uses a special motor-vehicle rate instead of its ordinary sales tax. Known specials: NC 3% Highway Use Tax · GA ~7% TAVT (one-time, replaces sales tax) · TX flat 6.25% motor-vehicle sales tax (no local add-on) · VA motor-vehicle SUT (not the combined sales rate) · OK 4.5% combined (1.25% sales + 3.25% excise) · NM 4% MVET · ND 5% excise · SD 4% excise · MS 5% vehicle rate · MN flat MVST (local-exempt) · OR 0.5% dealer privilege tax · SC IMF capped at $500 (≈1% at $50k — verify the cap, not a rate) · DE 4.25% doc fee (no sales tax) · DC weight-tiered excise · MT/NH no sales tax. Verify specials against the state DOR/DMV motor-vehicle page. Otherwise use Tax Foundation's latest "State and Local Sales Tax Rates" table, COMBINED state + average local rate. Tolerance ±0.25 percentage points.

2. title — one-time title fee ($). State DMV/DOT fee schedule. Tolerance ±$5.

3. reg — annual registration base fee ($), flat/base portion only (value-based components belong in propTax). For weight-tiered states (MD, ND, SD, DC, …) use the 4,500-5,500 lb passenger tier. If billed biennially, annualize (÷2). Tolerance ±$5.

4. evFee — annual EV surcharge ($). State DMV or statute, cross-checked against NCSL's EV-fee tracker and AFDC (afdc.energy.gov/laws/state). If the fee is indexed/scheduled to change, note it. Tolerance ±$5.

5. propTax — annual value-based vehicle tax, per $100 of retail value. State/county DOR. Also absorbs value-based state taxes that decline with the car's value (AZ VLT, NV GST, CO SOT, NE Motor-Vehicle Tax, value-based registration in MN/IA/MI). Conversion when the source quotes mills on an assessed value: per_$100 = (mill_rate ÷ 10) × assessment_ratio. Example — AZ VLT: $2.80 per $100 assessed, assessed = 60% of MSRP → 2.80 × 0.60 = 1.68 per $100 retail. Counties vary; a statewide typical value is acceptable (note the spread). 0 means no such tax — verify absence, don't assume it. Tolerance ±0.1.

6. ins — average annual full-coverage insurance ($). A named 2025-26 survey (Bankrate, NerdWallet, Insurance.com). Softest field. Tolerance ±20%.

7. kwh — average residential electricity rate (¢/kWh). EIA Electric Power Monthly, Table 5.6.A, residential column, latest month. Tolerance ±1¢.

8. gas — average regular gasoline price ($/gal). AAA state averages (gasprices.aaa.com/state-gas-price-averages/); fall back to EIA weekly retail if unreachable (note it). Record the read date. Tolerance ±$0.25.

Hard rules:
1. Verdict per field: "match" (within tolerance), "mismatch" (outside it), or "unverifiable" (no authoritative source found). Report "unverifiable" rather than guessing.
2. Every found value MUST carry a source_url that is a government page or a named survey/tracker (Tax Foundation, NCSL, AFDC, EIA, AAA, Bankrate, NerdWallet). Blogs, forums, and AI summaries do not count.
3. confidence: "high" = primary government source · "medium" = named tracker/survey · "low" = single indirect source (explain in note).
4. Do the arithmetic shown above; do not invent your own conversions. If a conversion is ambiguous, mark "unverifiable" and explain.
5. Output ONLY the completed JSON object — no prose before or after. Set "found": null when unverifiable.
</script>

<script src="../data/states.js"></script>
<script>
(function(){
  var FIELDS=['tax','title','reg','evFee','propTax','ins','kwh','gas'];
  var playbook=document.getElementById('playbook').textContent.trim();
  var now=new Date(),ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  function skeleton(row){
    var f=FIELDS.map(function(k){
      return '    "'+k+'": { "current": '+JSON.stringify(row[k])+', "found": null, "source_url": "", "source_date": "", "confidence": "", "verdict": "", "note": "" }';
    }).join(',\n');
    return '{\n  "state": "{CODE}",\n  "audited": "'+ym+'",\n  "auditor_model": "",\n  "fields": {\n'+f+'\n  }\n}';
  }
  function currentRow(code){
    var r=STATES[code],o={};FIELDS.forEach(function(k){o[k]=r[k];});return o;
  }
  function prompt(code){
    var r=STATES[code];
    return 'You are auditing one row of per-state data for an open-source Rivian R2 cost calculator.\n\n'
      +'STATE UNDER AUDIT: '+r.name+' ('+code+')\n'
      +'CURRENT VALUES: '+JSON.stringify(currentRow(code))+'\n'
      +'LAST AUDITED: '+(r.verified||'unknown')+'\n\n'
      +playbook+'\n\n'
      +'Return ONLY this JSON, completed:\n'
      +skeleton(r).replace('{CODE}',code);
  }
  function copy(txt,btn){
    function ok(){btn.classList.add('ok');var t=btn.textContent;btn.textContent='Copied ✓';
      setTimeout(function(){btn.classList.remove('ok');btn.textContent=t;},1800);}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok);}
    else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();}
  }

  var list=document.getElementById('list');
  Object.keys(STATES).sort(function(a,b){return STATES[a].name<STATES[b].name?-1:1;}).forEach(function(code){
    var r=STATES[code];
    var row=document.createElement('div');row.className='row';
    row.innerHTML='<span class="nm"><b>'+r.name+'</b> ('+code+')</span><span class="vr">verified '+(r.verified||'—')+'</span>';
    var btn=document.createElement('button');btn.textContent='Copy prompt';
    btn.onclick=function(){copy(prompt(code),btn);};
    row.appendChild(btn);list.appendChild(row);
  });
  document.getElementById('copyAll').onclick=function(){
    var all={};Object.keys(STATES).forEach(function(c){all[c]=currentRow(c);});
    copy(JSON.stringify(all,null,1),document.getElementById('copyAll'));
  };
})();
</script>
</body>
</html>
